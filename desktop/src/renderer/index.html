<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Adapter</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f5f5f5; color:#333; padding:20px;
    height:100vh; display:flex; flex-direction:column;
  }
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .header h1 { font-size:16px; color:#5c6bc0; margin:0; }
  .icon-btn {
    width:28px; height:28px; border:none; border-radius:4px;
    background:transparent; cursor:pointer;
    display:flex; align-items:center; justify-content:center; padding:0;
  }
  .icon-btn:hover { background:#e8e8e8; }
  .icon-btn svg { width:16px; height:16px; fill:#888; }
  .status-card {
    background:#fff; border:1px solid #e0e0e0; border-radius:6px;
    padding:12px 16px; margin-bottom:10px;
    display:flex; align-items:center; gap:10px;
  }
  .status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .status-dot.running { background:#4caf50; }
  .status-dot.stopped { background:#e0e0e0; }
  .status-label { font-size:13px; }
  .status-port { font-size:12px; color:#999; }
  .actions { display:flex; gap:6px; margin-bottom:10px; }
  button {
    padding:6px 14px; border:1px solid #ccc; border-radius:4px;
    cursor:pointer; font-size:12px; background:#fff; color:#333;
    transition:background .15s;
  }
  button:hover { background:#f0f0f0; }
  button:active { background:#e0e0e0; }
  button:disabled { opacity:.4; cursor:default; }
  .btn-start:not(:disabled) { background:#4caf50; border-color:#4caf50; color:#fff; }
  .btn-stop:not(:disabled) { background:#ef5350; border-color:#ef5350; color:#fff; }
  .btn-restart:not(:disabled) { background:#42a5f5; border-color:#42a5f5; color:#fff; }
  .log-area {
    background:#fff; border:1px solid #e0e0e0; border-radius:6px;
    padding:10px; flex:1; overflow-y:scroll;
    font-family:"Cascadia Code","Fira Code",Consolas,monospace;
    font-size:11px; line-height:1.6; color:#555;
    white-space:pre-wrap; word-break:break-all;
  }
</style>
</head>
<body>
<div class="header">
  <h1>Codex Adapter</h1>
  <button class="icon-btn" id="btnConfig" title="配置目录">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
  </button>
</div>

<div class="status-card">
  <div class="status-dot stopped" id="statusDot"></div>
  <div>
    <div class="status-label" id="statusLabel">服务未运行</div>
    <div class="status-port" id="statusPort"></div>
  </div>
</div>

<div class="actions">
  <button class="btn-start" id="btnStart">启动</button>
  <button class="btn-stop" id="btnStop" disabled>停止</button>
  <button class="btn-restart" id="btnRestart" disabled>重启</button>
</div>

<div class="log-area" id="logArea">加载中...</div>

<script type="module" src="./renderer.js"></script>
</body>
</html>
